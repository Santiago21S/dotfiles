# ~/.config/kitty/kitty.conf

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

# Permitir transparencias con colores RGBA
dynamic_background_opacity yes

font_size 14.0

window_padding_width 12 10

# Importar los colores dinámicos de Matugen
include colors-matugen.conf


