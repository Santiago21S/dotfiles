# ~/.config/matugen/templates/kitty.conf

# Forzamos a que el fondo sea un Hex plano de 6 dígitos sin caracteres extraños
background #{{colors.background.default.hex_stripped}}

# Kitty se encarga exclusivamente de la opacidad (60%)
background_opacity 0.25

# Permitir que el fondo sea dinámico
dynamic_background_opacity yes

# Resto de colores generados por Matugen (Limpios de espacios ocultos)
foreground {{colors.on_background.default.hex}}
cursor {{colors.primary.default.hex}}
selection_background {{colors.surface_variant.default.hex}}
selection_foreground {{colors.on_surface_variant.default.hex}}

# Paleta de colores ANSI
color0 {{colors.surface.default.hex}}
color8 {{colors.surface_variant.default.hex}}
color1 {{colors.error.default.hex}}
color9 {{colors.error_container.default.hex}}
color2 {{colors.primary.default.hex}}
color10 {{colors.primary_container.default.hex}}
color3 {{colors.tertiary.default.hex}}
color11 {{colors.tertiary_container.default.hex}}
color4 {{colors.secondary.default.hex}}
color12 {{colors.secondary_container.default.hex}}
color5 {{colors.inverse_primary.default.hex}}
color13 {{colors.outline.default.hex}}
color6 {{colors.primary.default.hex}}
color14 {{colors.primary_container.default.hex}}
color7 {{colors.on_surface.default.hex}}
color15 {{colors.on_surface_variant.default.hex}}
