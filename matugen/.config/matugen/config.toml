[config]
# Esta sección es obligatoria en las versiones nuevas de Matugen
reload_apps = true

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland.conf'
output_path = '~/.config/hypr/colors.conf'

[templates.waybar]
input_path = '~/.config/matugen/templates/waybar.css'
output_path = '~/.config/waybar/colors.css'
post_command = 'killall -SIGUSR2 waybar'

[templates.nvim_colors]
input_path = '~/.config/matugen/templates/nvim_colors.lua'
output_path = '~/.config/nvim/lua/matugen_colors.lua'

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty.conf'
output_path = '~/.config/kitty/colors-matugen.conf'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi.rasi'
output_path = '~/.config/rofi/colors-matugen.rasi'
