# --------------------------------------------------------
# ASPECTO VISUAL Y COMPORTAMIENTO (Actualizado)
# --------------------------------------------------------

source = ~/.config/hypr/colors.conf

# Monitor por defecto (Resolución, posición y escala automáticas)
monitor=,1920x1080@165,auto,auto

# Configuración de Espacios y Bordes

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    
    # Colores del borde (Gradiente activo y color inactivo)
    col.active_border = $accent
    col.inactive_border = $accent_inactive
    
    layout = dwindle
}

# Decoración (Esquinas redondas y efectos)
decoration {
    rounding = 12 # Esquinas un poco más suaves combinan mejor con el blur
    
    # Forzamos a Hyprland a mantener la ventana en su estado transparente nativo
    active_opacity = 1.0
    inactive_opacity = 0.90
    
    blur {
        enabled = true 
        size = 4             # Subimos el tamaño del blur
        passes = 2           # ¡CRÍTICO! Al menos 3 pases para generar el efecto esmerilado claro
        new_optimizations = true
        ignore_opacity = false # ¡IMPORTANTE! Si está en true, Hyprland ignora el 0.60 de tu Kitty
    }
}

# Sistema de Animaciones Nativo y Limpio
animations {
    enabled = true
    
    bezier = miCurva, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 7, miCurva
    animation = windowsOut, 1, 7, default
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Configuración del Layout
dwindle {
    preserve_split = true
}
