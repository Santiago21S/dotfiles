background {
    monitor =
    path = ~/Wallpapers/astronaut.png   # Tu fondo actual
    blur_passes = 2                     # Difuminar el fondo para estética
    blur_size = 4
}

# RELOJ DIGITAL
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# CAJA DE CONTRASEÑA
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2                     # Tamaño de los puntos de contraseña
    dots_spacing = 0.6
    fade_on_empty = false
    outer_color = rgba(0, 255, 153, 0.6) # Borde neón
    inner_color = rgba(17, 18, 26, 0.8)
    font_color = rgb(200, 200, 200)
    placeholder_text = <i>Introduce contraseña...</i>
    position = 0, -50
    halign = center
    valign = center
}
