# Importar la paleta de colores generada dinámicamente por Matugen
source = ~/.config/hypr/hyprlock-colors.conf

background {
    monitor =
    # Ruta fija usando el enlace simbólico dinámico creado por tu script
    path = ~/.config/hypr/actual_wallpaper.png   
    blur_passes = 3                     # Subido a 3 pases para un efecto esmerilado premium
    blur_size = 4
}

# RELOJ DIGITAL
label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = $text                       # Texto claro que contrasta dinámicamente
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# CAJA DE CONTRASEÑA
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2                     # Tamaño de los puntos de contraseña
    dots_spacing = 0.6
    fade_on_empty = false
    
    # Bordes dinámicos usando el color acento principal extraído de tu wallpaper
    outer_color = $accent
    inner_color = $bg_box
    font_color = $text
    
    placeholder_text = <i>Introduce contraseña...</i>
    position = 0, -50
    halign = center
    valign = center
}
